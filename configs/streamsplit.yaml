# StreamSplit Configuration
#
# Hyperparameters follow the paper's Sec. 5 ("Implementation") and Table 8
# ("Control Plane MDP Definition") wherever the paper states a concrete
# value. Section/equation references are noted inline.

experiment:
  name: "streamsplit_audioset"
  seed: 42
  device: "cpu"  # auto-detected at runtime by utils/device.py
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"

# Dataset configuration
data:
  dataset: "audioset"  # audioset, edge_audio
  data_dir: "./data"
  sample_rate: 16000
  audio_duration: 10  # seconds
  num_classes: 10
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Edge Learner (Sec. 4.1)
edge:
  # Mel-spectrogram extraction (Sec. 5: "128-bin mel spectrograms using
  # 25ms windows with 10ms hop length")
  fft:
    window_size_ms: 25
    hop_size_ms: 10
    n_fft: 512
    n_mels: 128
    fmin: 80
    fmax: 8000

  # Augmentation for the contrastive positive pair (Sec. 4.1.3: "random
  # Gaussian noise and frequency masking")
  augmentation:
    noise_std: 0.01
    freq_mask_param: 10

  # Distributional Memory: GMM + boundary-aware sampling (Eq. 7-9,
  # Sec. 4.1.2-4.1.3, Sec. 5)
  distributional_memory:
    num_components: 64     # C
    tau: 0.1                # boundary-aware sampling temperature (Eq. 9)
    cold_start_frames: 50   # Sec. 4.1.2
    ema_lr: 0.01

  # Streaming contrastive learning (Eq. 10, Sec. 5)
  contrastive:
    temperature: 0.1
    n_syn: 256              # virtual negatives per anchor

  resource_monitor:
    poll_interval_ms: 100
    bandwidth_ema_alpha: 0.3
    bandwidth_init_mbps: 10.0

# Audio encoder (Sec. 5: "ResNet-18 adapted for 1D audio... L=8 splitable
# blocks with an output dimension d=128")
encoder:
  backbone: "resnet18_1d"
  num_blocks: 8            # L
  embedding_dim: 128       # d

# Control Plane: Uncertainty-Guided Adaptive Splitter (Sec. 4.2, Table 8)
control_plane:
  max_episode_steps: 100
  step_frames: 10           # T_step (~100ms), Sec. 4.2.2

  reward:                   # Eq. 12
    alpha: 10
    beta: 5
    eta: 3
    t_max_ms: 200.0          # T_max
    e_budget_mj: 100.0       # E_budget

  ppo:
    hidden_dim: 128
    learning_rate: 0.0003
    gamma: 0.99
    lambda_gae: 0.95
    epsilon_clip: 0.2
    entropy_coef: 0.01
    value_coef: 0.5
    max_grad_norm: 0.5
    update_epochs: 10
    batch_size: 64

# Cloud Refiner: Temporal Buffer + Hybrid Loss (Sec. 4.3, Eq. 13, Sec. 5)
hybrid_loss:
  num_projections: 50      # M, Sliced-Wasserstein (Sec. 5)
  lambda_sw: 0.1            # lambda_1 (Sec. 5)
  lambda_lap: 0.01          # lambda_2 (Sec. 5)
  window: 100                # W, Temporal Buffer (Sec. 4.3.1)
  k_neighbors: 5             # k, temporal k-NN graph (Sec. 4.3.1)
  sync_every: 100            # T_sync, Lazy Synchronization (Sec. 4.3.3)

training:
  edge:
    optimizer: "adam"
    learning_rate: 0.001    # 1e-3, Sec. 5
    batch_size: 8            # N, Sec. 5
  server:
    optimizer: "sgd"
    momentum: 0.9
    num_epochs: 100
    refine_every: 8           # batches between Cloud Refiner hybrid-loss steps

logging:
  level: "INFO"
  save_frequency: 10        # epochs

reproducibility:
  deterministic: true
  benchmark: false
